<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cloudflare.com">
    <title>Forum</title>
</head>
<body class="pt-5">
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom fixed-top mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'account:index' %}">Форум</a>

        <div class="collapse navbar-collapse d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center">
                {% if request.user.is_authenticated %}
                    <a href="{% url 'account:create_topic' %}" class="btn btn-outline-dark btn-sm d-flex align-items-center me-3">
                        <i class="fa-solid fa-plus me-1"></i> Создать тему
                    </a>
                {% endif %}
            </div>
            <div class="d-flex align-items-center gap-3">
                {% if request.user.is_authenticated %}
                    <a href="{% url 'account:profile' pk=user.pk %}" class="btn btn-sm btn-outline-secondary">Кабинет</a>
                   <form action="{% url 'account:logout' %}" method="POST" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-sm btn-danger">Выход</button>
                    </form>
                {% else %}
                    <a href="{% url 'account:login' %}" class="btn btn-sm btn-outline-primary">Вход</a>
                    <a href="{% url 'account:register' %}" class="btn btn-sm btn-primary">Регистрация</a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>
 <div class="container mt-5">
        {% block content %}
        {% endblock %}
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
<script src="https://kit.fontawesome.com/YOUR_KIT_CODE.js" crossorigin="anonymous"></script>
</body>
</html>
